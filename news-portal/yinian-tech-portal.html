      --white: #fff;

    .right-column { display: flex; flex-direction: column; gap: 20px; }

    .news-card-title { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .news-card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }

    .video-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }

      sunset: '18:25',
      forecast: [
        { day: '今天', high: 26, low: 12, icon: '☀️' },
        { day: '明天', high: 25, low: 14, icon: '🌦️' },
        { day: '后天', high: 18, low: 13, icon: '🌧️' }
      ],
      advice: '今日晴好适宜出行，明起有雨注意带伞，后天降温明显请添衣。'
    };

    // ==================== 渲染函数 ====================
    function renderChannels() {
      const container = document.getElementById('channels');
      container.innerHTML = channels.map(ch => 
        `<button class="channel-btn ${activeChannel === ch ? 'active' : ''}" onclick="setChannel('${ch}')">${ch}</button>`
      ).join('');
    }

    function setChannel(ch) {
      activeChannel = ch;
      renderChannels();
    }

    function renderNews() {
      const container = document.getElementById('newsFeed');
      const topNews = newsData.find(n => n.isTop);
      const otherNews = newsData.filter(n => !n.isTop);

      let html = '';
      
      // 焦点新闻
      if (topNews) {
        html += `
          <article class="focus-news">
            <div class="focus-image">
              <img src="${topNews.image}" alt="${topNews.title}" loading="lazy">
              <span class="focus-badge">头条</span>
            </div>
            <div class="focus-content">
              <span class="focus-category">${topNews.category}</span>
              <h1 class="focus-title">${topNews.title}</h1>
              <p class="focus-summary">${topNews.summary}</p>
              <div class="focus-meta">
                <span>${topNews.source}</span>
                <span>${topNews.time}</span>
              </div>
            </div>
          </article>
        `;
      }

      // 新闻网格
      html += '<div class="news-grid">' + otherNews.map(item => `
        <article class="news-card">
          <div class="news-card-image">
            <img src="${item.image}" alt="${item.title}" loading="lazy">
          </div>
          <div class="news-card-body">
            <h3 class="news-card-title">${item.title}</h3>
            <div class="news-card-meta">
              <span>${item.source}</span>
              <span>${item.time}</span>
            </div>
          </div>
        </article>
      `).join('') + '</div>';

      container.innerHTML = html;
    }

    function renderVideos() {
      const container = document.getElementById('videoSection');
      container.innerHTML = `
        <div class="section-header">
          <h2>📺 精选视频</h2>
          <a href="https://www.bilibili.com/v/popular/rank/all" class="more-link" target="_blank">查看更多 →</a>
        </div>
        <div class="video-grid">
          ${videoData.map(v => `
            <div class="video-card" onclick="window.open('${v.url}', '_blank')">
              <div class="video-thumbnail">
                <img src="${v.thumbnail}" alt="${v.title}" loading="lazy" onerror="this.src='https://picsum.photos/320/180?random=${v.id}'">
                <div class="video-overlay">
                  <button class="play-btn">▶</button>
                </div>
                <span class="video-duration">${v.duration}</span>
              </div>
              <div class="video-info">
                <h4 class="video-title">${v.title}</h4>
                <div class="video-meta">
                  <span>${v.author}</span>
                  <span>${v.views}次观看</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderWeather(data) {
      const container = document.getElementById('weatherCard');
      if (!data) {
        container.innerHTML = '<div class="loading">加载中...</div>';
        return;
      }
      container.innerHTML = `
        <div class="weather-header">
          <h3>🌤️ 天气</h3>
          <span class="weather-city">${data.city}</span>
        </div>
        <div class="weather-current">
          <div class="weather-temp">${data.temp}°</div>
          <div class="weather-info">
            <span class="weather-condition">${data.condition}</span>
            <span>${data.high}° / ${data.low}°</span>
          </div>
        </div>
        <div class="weather-details">
          <div class="detail-item">
            <span>💧 湿度</span>
            <span>${data.humidity}%</span>
          </div>
          <div class="detail-item">
            <span>💨 风速</span>
            <span>${data.wind}</span>
          </div>
        </div>
        <div class="weather-forecast">
          ${data.forecast.map(f => `
            <div class="forecast-item">
              <span class="forecast-day">${f.day}</span>
              <span class="forecast-icon">${f.icon}</span>
              <span class="forecast-temp">${f.high}°/${f.low}°</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderTrending(data) {
      const container = document.getElementById('trendingCard');
      if (!data) {
        container.innerHTML = `
          <div class="trending-header">
            <h3>🔥 实时热搜</h3>
            <span class="trending-source">百度热搜</span>
          </div>
          <div class="loading">加载中...</div>
        `;
        return;
      }
      container.innerHTML = `
        <div class="trending-header">
          <h3>🔥 实时热搜</h3>
          <span class="trending-source">百度热搜</span>
        </div>
        <ul class="trending-list">
          ${data.map(item => `
            <li class="trending-item">
              <span class="rank ${item.rank <= 3 ? 'top' : ''}">${item.rank}</span>
              <span class="title">${item.title}</span>
              <span class="heat">${item.heat}</span>
              ${item.trend === 'up' ? '<span class="trend up">↑</span>' : ''}
              ${item.trend === 'down' ? '<span class="trend down">↓</span>' : ''}
              ${item.trend === 'new' ? '<span class="trend new">新</span>' : ''}
              ${item.trend === 'hot' ? '<span class="trend" style="color:#e81123">🔥</span>' : ''}
            </li>
          `).join('')}
        </ul>
      `;
    }

    // ==================== 初始化 ====================
    function init() {
      renderChannels();
      renderNews();
      renderVideos();
      renderWeather(weatherData);
      renderTrending(trendingData);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
