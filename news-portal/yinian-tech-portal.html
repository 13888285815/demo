    :root {
      --primary: #0078d4;
      --primary-dark: #005a9e;
      --text: #333;
      --text-light: #666;
      --text-muted: #999;
      --border: #e5e5e5;
      --white: #fff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: var(--text);

    .app { min-height: 100vh; display: flex; flex-direction: column; }

    .header { background: var(--white); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }

    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .logo-icon { width: 32px; height: 32px; }
    .logo-text { font-size: 22px; font-weight: 700; color: #333; }

    .search-input { flex: 1; padding: 10px 16px; border: 1px solid var(--border); border-radius: 4px 0 0 4px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--primary); }
    .search-btn { padding: 10px 16px; border: 1px solid var(--primary); background: var(--primary); border-radius: 0 4px 4px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .header-actions { display: flex; gap: 12px; }
    .action-btn { padding: 8px 20px; border: 1px solid var(--primary); background: transparent; color: var(--primary); border-radius: 4px; cursor: pointer; font-size: 14px; }

    /* Channels */

    .channels-inner { display: flex; max-width: 1400px; margin: 0 auto; overflow-x: auto; padding: 0 24px; }
    .channel-btn { padding: 14px 20px; border: none; background: transparent; cursor: pointer; font-size: 15px; color: var(--text); white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
    .channel-btn:hover { color: var(--primary); }
    .channel-btn.active { color: var(--primary); font-weight: 600; border-bottom-color: var(--primary); }

    /* Main */
    .main-content { flex: 1; padding: 20px 0; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 340px; gap: 24px; }
    .left-column { display: flex; flex-direction: column; gap: 20px; }
    .right-column { display: flex; flex-direction: column; gap: 20px; }

    /* Focus News */
    .focus-news { display: grid; grid-template-columns: 1.2fr 1fr; background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; }
    .focus-image { position: relative; height: 400px; overflow: hidden; }
    .focus-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .focus-news:hover .focus-image img { transform: scale(1.03); }

    .focus-title:hover { color: var(--primary); }
    .focus-summary { font-size: 14px; color: var(--text-light); line-height: 1.8; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .focus-meta { font-size: 13px; color: var(--text-muted); display: flex; gap: 16px; }

    /* News Grid */
    .news-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .news-card { background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: all 0.2s; }
    .news-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .news-card-image { height: 160px; overflow: hidden; }
    .news-card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .news-card:hover .news-card-image img { transform: scale(1.05); }
    .news-card-body { padding: 14px; }
    .news-card-title { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .news-card-title:hover { color: var(--primary); }
    .news-card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; }

    /* Video Section */
    .video-section { background: var(--white); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); padding: 20px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

    .more-link { color: var(--text-light); font-size: 13px; text-decoration: none; }
    .more-link:hover { color: var(--primary); }
    .video-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .video-card { border-radius: 6px; overflow: hidden; background: #f8f8f8; cursor: pointer; transition: transform 0.2s; }
    .video-card:hover { transform: translateY(-3px); }
    .video-thumbnail { position: relative; padding-top: 56.25%; }
    .video-thumbnail img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .video-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .video-card:hover .video-overlay { opacity: 1; }
    .play-btn { width: 48px; height: 48px; background: rgba(255,255,255,0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; border: none; cursor: pointer; color: #333; }

    .video-title { font-size: 13px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; justify-content: space-between; }

    .forecast-icon { font-size: 20px; display: block; margin-bottom: 4px; }

    .trending-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .trending-item:last-child { border-bottom: none; }

    .trending-item .heat { font-size: 12px; color: var(--text-muted); }

    .trending-item .trend.down { color: #107c10; }

    .footer-content { max-width: 1400px; margin: 0 auto; padding: 40px 24px; display: flex; justify-content: space-between; }

    .footer-logo { display: block; margin-bottom: 8px; }
    .footer-brand p { font-size: 14px; color: #999; }
    .footer-links { display: flex; gap: 60px; }
    .link-group h4 { font-size: 14px; margin-bottom: 12px; }
    .link-group a { display: block; font-size: 13px; color: #999; text-decoration: none; margin-bottom: 8px; }
    .link-group a:hover { color: #fff; }
    .footer-bottom { border-top: 1px solid #333; padding: 20px 24px; text-align: center; font-size: 13px; color: #666; }

    /* Update Time Badge */
    .update-badge { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; box-shadow: var(--shadow-hover); z-index: 1000; }

    /* Responsive */
    @media (max-width: 1024px) {
      .container { grid-template-columns: 1fr; }
      .focus-news { grid-template-columns: 1fr; }
      .focus-image { height: 280px; }
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .header-top { flex-wrap: wrap; gap: 12px; }
      .search-box { order: 3; flex: 1 1 100%; max-width: none; margin: 0; }
      .news-grid { grid-template-columns: 1fr; }
      .video-grid { grid-template-columns: 1fr; }
      .footer-content { flex-direction: column; gap: 30px; }
      .footer-links { flex-wrap: wrap; gap: 30px; }
    }
  </style>
</head>

            </div>
            <div class="focus-content">
              <span class="focus-category">${topNews.category}</span>
              <h1 class="focus-title">${topNews.title}</h1>
              <p class="focus-summary">${topNews.summary}</p>
              <div class="focus-meta">
                <span>${topNews.source}</span>
                <span>${topNews.time}</span>
              </div>
            </div>
          </article>
        `;
      }

      // 新闻网格
      html += '<div class="news-grid">' + otherNews.map(item => `
        <article class="news-card">
          <div class="news-card-image">
            <img src="${item.image}" alt="${item.title}" loading="lazy">
          </div>
          <div class="news-card-body">
            <h3 class="news-card-title">${item.title}</h3>
            <div class="news-card-meta">
              <span>${item.source}</span>
              <span>${item.time}</span>
            </div>
          </div>
        </article>
      `).join('') + '</div>';

      container.innerHTML = html;
    }

    function renderVideos() {
      const container = document.getElementById('videoSection');
      container.innerHTML = `
        <div class="section-header">
          <h2>📺 精选视频</h2>
          <a href="#" class="more-link">查看更多 →</a>
        </div>
        <div class="video-grid">
          ${videoData.map(v => `
            <div class="video-card">
              <div class="video-thumbnail">
                <img src="${v.thumbnail}" alt="${v.title}" loading="lazy">
                <div class="video-overlay">
                  <button class="play-btn">▶</button>
                </div>
                <span class="video-duration">${v.duration}</span>
              </div>
              <div class="video-info">
                <h4 class="video-title">${v.title}</h4>
                <div class="video-meta">
                  <span>${v.author}</span>
                  <span>${v.views}次观看</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderWeather(data) {
      const container = document.getElementById('weatherCard');
      if (!data) {
        container.innerHTML = '<div class="loading">加载中...</div>';
        return;
      }
      container.innerHTML = `
        <div class="weather-header">
          <h3>🌤️ 天气</h3>
          <span class="weather-city">${data.city}</span>
        </div>
        <div class="weather-current">
          <div class="weather-temp">${data.temp}°</div>
          <div class="weather-info">
            <span class="weather-condition">${data.condition}</span>
            <span>${data.high}° / ${data.low}°</span>
          </div>
        </div>
        <div class="weather-details">
          <div class="detail-item">
            <span>💧 湿度</span>
            <span>${data.humidity}%</span>
          </div>
          <div class="detail-item">
            <span>💨 风速</span>
            <span>${data.wind}</span>
          </div>
        </div>
        <div class="weather-forecast">
          ${data.forecast.map(f => `
            <div class="forecast-item">
              <span class="forecast-day">${f.day}</span>
              <span class="forecast-icon">${f.icon}</span>
              <span class="forecast-temp">${f.high}°/${f.low}°</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderTrending(data) {
      const container = document.getElementById('trendingCard');
      if (!data) {
        container.innerHTML = `
          <div class="trending-header">
            <h3>🔥 实时热搜</h3>
            <span class="trending-source">微博</span>
          </div>
          <div class="loading">加载中...</div>
        `;
        return;
      }
      container.innerHTML = `
        <div class="trending-header">
          <h3>🔥 实时热搜</h3>
          <span class="trending-source">微博</span>
        </div>
        <ul class="trending-list">
          ${data.map(item => `
            <li class="trending-item">
              <span class="rank ${item.rank <= 3 ? 'top' : ''}">${item.rank}</span>
              <span class="title">${item.title}</span>
              <span class="heat">${item.heat}</span>
              ${item.trend === 'up' ? '<span class="trend up">↑</span>' : ''}
              ${item.trend === 'down' ? '<span class="trend down">↓</span>' : ''}
              ${item.trend === 'new' ? '<span class="trend new">新</span>' : ''}
            </li>
          `).join('')}
        </ul>
      `;
    }

    // ==================== 初始化 ====================
    function init() {
      renderChannels();
      renderNews();
      renderVideos();
      renderWeather(weatherData);
      renderTrending(trendingData);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
